apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kronaxis-router.fullname" . }}
  labels:
    {{- include "kronaxis-router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kronaxis-router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kronaxis-router.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8050
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: CONFIG_PATH
              value: /app/config.yaml
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
            - name: BATCH_DATA_DIR
              value: /data/batches
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          {{- if .Values.config.existingConfigMap }}
          configMap:
            name: {{ .Values.config.existingConfigMap }}
          {{- else }}
          configMap:
            name: {{ include "kronaxis-router.fullname" . }}-config
          {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kronaxis-router.fullname" . }}-data
        {{- end }}
