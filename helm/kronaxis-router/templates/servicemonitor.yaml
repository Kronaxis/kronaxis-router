{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kronaxis-router.fullname" . }}
  labels:
    {{- include "kronaxis-router.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kronaxis-router.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      interval: {{ .Values.serviceMonitor.interval }}
      path: {{ .Values.serviceMonitor.path }}
{{- end }}
