# Kronaxis Router Helm Chart values

replicaCount: 1

image:
  repository: ghcr.io/kronaxis/kronaxis-router
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8050

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: router.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Router configuration
config:
  # Mount a ConfigMap as config.yaml
  # Override with your own backends and rules
  existingConfigMap: ""

# Environment variables
env:
  ROUTER_PORT: "8050"
  # DATABASE_URL: "postgres://user:pass@db:5432/mydb?sslmode=disable"
  # GEMINI_API_KEY: ""
  # ROUTER_API_TOKEN: ""
  # CACHE_MAX_SIZE: "1000"
  # CACHE_TTL_SECONDS: "3600"
  # QUALITY_ENABLED: "true"
  # AUDIT_ENABLED: "true"

# Secrets (mounted as env vars)
existingSecret: ""

# Persistence for batch job data
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
